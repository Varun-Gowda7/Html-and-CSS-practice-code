<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="display: flex; justify-content: center;">
        
        <form action="#">
            <h1>Login form using HTML and CSS</h1>
            <h3>Sign in</h3>
            <p>Sign in with your username and password</p>
            <label for="username">Your Username </label>
            <input type="text" id="username" placeholder="Enter Username" name="username" maxlength="20" minlength="3">
            <br><br>
            <label for="password">Your Password </label>
            <input type="password" id="password" placeholder="Enter Password" name="password" min="6">
            <br>
            <button>Login</button>
            <br>
            <p>Not a member? <a href="">Register here!</a></p> 



        </form>
    </div>



    <form action="#">
        <div style="display: flex; justify-content: center;">
        <fieldset>
            <h2 style="text-align: center;">Registration Form</h2>
            <br>
            <label for="fs">First Name:</label>
            <input type="text" id="fs" placeholder="Enter First Name" name="First Name" maxlength="20" minlength="3">
            <br>
            <br>
            <label for="ls">Last Name: </label>
            <input type="text" id="ls" placeholder="Enter Last Name" name="Last Name"  maxlength="20" minlength="3">
            <br>
            <br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="Email" placeholder="Enter Email Address">
            <br>
            <br>
            <label for="pass">Password:</label>
            <input type="password" id="pass" name="Password">
            <br>
            <br>
            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="Gender" value="Male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="Gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="Gender" value="Other">
            <label for="other">Other</label>
            <br>
            <br>
            <label for="age">Age:</label>
            <input type="number" id="age" name="Age" min="1" max="100">
            <br><br>
            <label for="preferences">Preferences:</label>
            <label for="ar">Arcylic Painting</label>
            <input type="checkbox" id="ol" name="preferences" >
            <label for="ol">Oil Painting</label>
            <input type="checkbox" id="wt" name="preferences">
            <label for="wt">Water Color Painting</label>
            <input type="checkbox" id="wt" name="preferences">
            <br><br>
            <label for="occ">Occupation:</label>
            <select name="Occupation" id="occ">
                <option value="student">Student</option>
                <option value="employed">Employed</option>
                <option value="self employed">Self employed</option>
            </select>
            <br><br>
            <label for="bio">Bio:</label>
            <textarea name="Bio" id="bio" placeholder="Share few lines about yourself..." rows="6" cols="22"></textarea>
            <br><br>
            <button style="text-align: center;">Reset</button>
            <button>Submit</button>




        </fieldset>
        </div>
    </form>

        <form action="#">

    <div style="display: flex; justify-content: center;">
    <form action="#">
        <h2>All Form Types Demo</h2>
        <label for="te">Text:</label>
        <input type="text" id="te" placeholder="Your name" name="your name">
        <br><br>
        <label for="pass">Password:</label>
        <input type="password" id="pass" name="Password" placeholder="Secret" min="6">
        <br><br>
        <label for="email">Email:</label>
        <input type="email" name="Email" id="email" placeholder="you@example.com">
        <br><br>
        <label for="url">URL:</label>
        <input type="url" id="url" name="url" placeholder="https://example.com">
        <br><br>
        <label for="tel">Telephone:</label>
        <input type="tel" id="tel" name="Phone number" placeholder="+91 9606209065" pattern="[0-9]{10}">
        <br><br>
        <label for="search">Search:</label>
        <input type="search" id="search" name="Search" placeholder="Search term">
        <br><br>
        <label for="num">Number:</label>
        <input type="number" id="num" name="Number">
        <br><br>
        <label for="ran">Range:</label>
        <input type="range" id="ran" name="Range">
        <br><br>
        <label for="date">Date:</label>
        <input type="date" id="date" name="Date">
        <label for="time">Time:</label>
        <input type="time" id="time" name="Time">
        <label for="week">Week:</label>
        <input type="week" id="week" name="Week">
        <label for="month">Month:</label>
        <input type="month" id="month" name="Month">
        <br><br>
        <label for="file">File:</label>
        <input type="file" id="file" name="File">
        <br><br>
        <label for="color">Color:</label>
        <input type="color" id="color" name="Color">
        <br><br>
        <label for="checkbox">
        <input type="checkbox" id="ag" name="checkbox" value="i agree">

        </label>

        <br>
        <input type="radio" id="male" name="gender" value="male">

        <br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>
        <br><br>
        <label for="country">Country(single select):</label>
        <select name="country" id="country">
            <option value="choose">--choose--</option>
            <option value="India">India</option>
            <option value="uk">UK</option>
            <option value="USA">USA</option>
        </select>
        <br><br>
        <label for="msg">Message:</label>
        <textarea name="Comment" id="msg" rows="4" cols="20">Write something...</textarea>
        <br><br>
        <button>Submit Form</button>
        <button>Reset Form</button>

    </form>
    </div>
