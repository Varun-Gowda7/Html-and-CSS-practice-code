<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 100%;

        }
        th{
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th> </th>
            <th>1</th>
            <th>2</th>
            <th>3</th>
            <th>4</th>
            <th>5</th>
            <th>6</th>
            <th>7</th>
            <th> </th>

        </tr>
        <tr>
            <th>1</th>
            <th rowspan="2" colspan="3">A</th>
            <th rowspan="2" colspan="4">B</th>
            <th>1</th>
        </tr>
        <tr>
            <th>2</th>
            <th>2</th>
        </tr>
        <tr>
            <th>3</th>
            <th colspan="7">C</th>
            <th>3</th>
        </tr>
        <tr>
            <th>4</th>
            <th rowspan="2" colspan="6">D</th>
            <th>E</th>
            <th>4</th>
        </tr>
        <tr>
            <th>5</th>
            <th>F</th>
            <th>5</th>

        </tr>
        <tr>
            <th> </th>
            <th>1</th>
            <th>2</th>
            <th>3</th>
            <th>4</th>
            <th>5</th>
            <th>6</th>
            <th>7</th>
            <th> </th>
        </tr>
    </table>
    
</body>
</html>
