
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table-4</title>
</head>
<style>
    table{
        border: 3px solid black;
        border-collapse: collapse;
        width: 20%;
    }
    th{
        border: 3px solid black;
        padding: 20px; 
    }
</style>
<body>
    <p><strong> Table With Column and Row spanned </strong></p>
    <table>
        <tr>
            <th style="background-color:plum;">Logo</th>
            <th colspan="3" style="background-color: lightyellow;">Top Menu</th>
        </tr>
        <tr>
            <th rowspan="2" style="background-color: lightyellow;">Side Menu</th>
            <th style="background-color:lightblue ;">World News</th>
            <th style="background-color: lightblue;">Financial</th>
            <th rowspan="2" style="background-color:plum;">List of Ads</th>
        </tr>
        <tr>
            <th style="background-color: lightblue;">Technology</th>
            <th style="background-color: lightblue;">Sports</th>
        </tr>
        <tr>
            <th colspan="4" style="background-color: grey;">Footer</th>
        </tr>
    </table>
</body>
</html>
</body>
</html>
