   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Table-6</title>
    <style>
        table{
            background-color: lightgreen;
            width: 50%;
            border: 2px solid black;

        }
        th{
            padding: 20px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Table in HTML</h1>
    <table>
        <tr>
            <th rowspan="2" style="border-color: salmon;">A</th>
            <th style="background-color: palegoldenrod;">B</th>
            <th rowspan="3" style="background-color: lavender;">D</th>
            <th colspan="2" style="background-color: grey;">E</th>
            <th style="background-color: salmon;">F</th>
        </tr>
        <tr>
            <th>C</th>
            <th rowspan="2" style="background-color: peachpuff;">G</th>
            <th rowspan="2" style="background-color: lightgreen;">H</th>
            <th rowspan="2" style="background-color: salmon;">I</th>
        </tr>
        <tr>
            <th colspan="2" style="background-color: white-space: nowrap;;">J</th>
        </tr>
        <tr>
            <th colspan="3" style="background-color: palegoldenrod;">K</th>
            <th style="background-color: palegoldenrod;">L</th>
            <th colspan="2" style="background-color: lavender;">M</th>
        </tr>
    </table>
</body>
</html>
</body>
