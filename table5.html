<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table-5</title>
</head>
<style>
    table{
        width:30% ;
    }
    th{
        border: 1px solid black;
        padding: 20px;
    }
</style>
<body>
    <p><strong>Table-5</strong></p>
    <table>
        <tr>
            <th style="background-color: yellow;">1</th>
            <th colspan="2" style="background-color: yellow;">2</th>
            <th colspan="2" style="background-color: yellow;">3</th>
        </tr>
        <tr>
            <th rowspan="2" colspan="2" style="background-color: lightblue;">4</th>
            <th colspan="3" style="background-color: lightblue;">5</th>
        </tr>
        <tr>
            <th colspan="2" style="background-color: lightgreen;">6</th>
            <th rowspan="3" style="background-color: lightgreen;">7</th>
        </tr>
        <tr>
            <th rowspan="5" style="background-color: lightyellow;">8</th>
            <th style="background-color: lightyellow;">9</th>
            <th style="background-color: lightyellow;">10</th>
            <th rowspan="2" style="background-color: lightyellow;">11</th>
        </tr>
        <tr>
            <th colspan="2" style="background-color: lightcoral;">12</th>
        </tr>
        <tr>
            <th rowspan="3" style="background-color: lightpink;">13</th>
            <th colspan="3" style="background-color: lightpink;">14</th>
        </tr>
        <tr>
            <th colspan="2" style="background-color: orangered;">15</th>
            <th style="background-color: orangered;">16</th>
        </tr>
        <tr>
            <th colspan="3" style="background-color:goldenrod;">17</th>
        </tr>
    </table>
</body>
</html>
